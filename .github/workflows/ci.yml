name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true

      - run: uv sync --extra dev

      - run: uv run ruff check .

      # tests/test_schema_artifact.py is the scraper-side drift test:
      # fails if src/yasli_scraper/models.py and
      # schemas/snapshot.v2.schema.json disagree.
      - run: uv run pytest
